name: Hyv
options:
  bundleIdPrefix: com.hyv
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.0"

targets:
  Hyv:
    type: application
    platform: macOS
    sources:
      - Hyv
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hyv.app
        MARKETING_VERSION: "0.1.5"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: Hyv/Hyv.entitlements
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_NSScreenCaptureUsageDescription: "Hyv needs screen capture access to record meeting audio."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Hyv needs microphone access to capture your voice during meetings."
    dependencies:
      - sdk: ScreenCaptureKit.framework
      - sdk: AVFoundation.framework
      - sdk: CoreMedia.framework
